name: ci

on:
  push:
    paths-ignore:
      - '**/*.md'
      - '.github/workflows/**'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '.github/workflows/**'
      - '.gitignore'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        arch: [x64]
        include:
          - os: macos-latest
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build -c Release
      - name: Test
        run: dotnet run --project tests/Overfloat.Tests/Overfloat.Tests.csproj -c Release
