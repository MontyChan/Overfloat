name: manual-release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        type: string
      configuration:
        description: Build configuration
        required: false
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build-assets:
    strategy:
      fail-fast: false
      matrix:
        python:
          - version: '3.9'
            tag: py39
          - version: '3.10'
            tag: py310
          - version: '3.11'
            tag: py311
          - version: '3.12'
            tag: py312
          - version: '3.13'
            tag: py313
        target:
          - os: windows-latest
            runtime: win-x64
            artifact_name: overfloat-win-x64
            platform_tag: win_amd64
            package_library: overfloat.dll
          - os: ubuntu-latest
            runtime: linux-x64
            artifact_name: overfloat-linux-x64
            platform_tag: manylinux_2_17_x86_64
            package_library: liboverfloat.so
          - os: macos-14
            runtime: osx-arm64
            artifact_name: overfloat-osx-arm64
            platform_tag: macosx_11_0_arm64
            package_library: liboverfloat.dylib
    runs-on: ${{ matrix.target.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Validate tag matches VERSION
        shell: pwsh
        run: |
          $version = (Get-Content -LiteralPath "VERSION" -Raw).Trim()
          $tag = "${{ inputs.tag }}".Trim()
          $normalizedTag = if ($tag.StartsWith("v")) { $tag.Substring(1) } else { $tag }
          if ($normalizedTag -ne $version) {
            throw "Release tag '$tag' does not match VERSION '$version'."
          }
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python.version }}
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore
      - name: Validate
        run: dotnet test tests/Overfloat.Tests/Overfloat.Tests.csproj -c ${{ inputs.configuration }}
      - name: Publish
        run: dotnet publish Overfloat.csproj -c ${{ inputs.configuration }} -r ${{ matrix.target.runtime }} --self-contained true /p:DebugType=None /p:DebugSymbols=false
      - name: Prepare Python package native library
        shell: pwsh
        run: |
          $publishDir = "bin/${{ inputs.configuration }}/net8.0/${{ matrix.target.runtime }}/publish"
          $packageDir = "python/overfloat"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Get-ChildItem -Path $packageDir -File |
            Where-Object { $_.Extension -in @('.dll', '.so', '.dylib') } |
            Remove-Item -Force
          $nativeLibrary = Get-ChildItem -Path $publishDir -File |
            Where-Object { $_.Name -match '^(lib)?overfloat\.(dll|so|dylib)$' } |
            Select-Object -First 1
          if ($null -eq $nativeLibrary) {
            throw "No published native library was found in $publishDir."
          }
          Copy-Item -LiteralPath $nativeLibrary.FullName -Destination "$packageDir/${{ matrix.target.package_library }}" -Force
      - name: Build wheel
        shell: pwsh
        run: |
          python -m pip install --upgrade pip build wheel setuptools
          if (Test-Path -LiteralPath "python/dist") {
            Remove-Item -LiteralPath "python/dist" -Recurse -Force
          }
          python -m build --wheel --outdir python/dist python
          $wheelFiles = Get-ChildItem -Path "python/dist" -Filter *.whl -File
          foreach ($wheel in $wheelFiles) {
            python -m wheel tags --platform-tag "${{ matrix.target.platform_tag }}" --remove $wheel.FullName
          }
      - name: Stage release files
        shell: pwsh
        run: |
          $publishDir = "bin/${{ inputs.configuration }}/net8.0/${{ matrix.target.runtime }}/publish"
          $stageDir = "artifacts/${{ matrix.target.artifact_name }}-${{ matrix.python.tag }}"
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          if ("${{ matrix.python.tag }}" -eq "py311") {
            Get-ChildItem -Path $publishDir -File |
              Where-Object { $_.Extension -in @('.dll', '.so', '.dylib', '.json', '.runtimeconfig.json') -or $_.Name -match '^(lib)?overfloat\.(dll|so|dylib)$' } |
              Copy-Item -Destination $stageDir -Force
          }
          $wheelFiles = Get-ChildItem -Path "python/dist" -Filter *.whl -File
          if ($wheelFiles.Count -eq 0) {
            throw "No wheel files were generated in python/dist."
          }
          $wheelFiles | Copy-Item -Destination $stageDir -Force
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.artifact_name }}-${{ matrix.python.tag }}
          path: artifacts/${{ matrix.target.artifact_name }}-${{ matrix.python.tag }}/*
          if-no-files-found: error

  release:
    needs: build-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          draft: false
          prerelease: false
          files: release-artifacts/**/*
