name: manual-release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        type: string
      configuration:
        description: Build configuration
        required: false
        default: Release
        type: choice
        options:
          - Release
          - Debug

jobs:
  build-assets:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: windows-latest
            runtime: win-x64
            artifact-name: overfloat-win-x64
            platform-tag: win_amd64
            package-library: overfloat.dll
          - runs-on: ubuntu-latest
            runtime: linux-x64
            artifact-name: overfloat-linux-x64
            platform-tag: manylinux_2_17_x86_64
            package-library: liboverfloat.so
          - runs-on: macos-14
            runtime: osx-arm64
            artifact-name: overfloat-osx-arm64
            platform-tag: macosx_11_0_arm64
            package-library: liboverfloat.dylib
    runs-on: ${{ matrix.runs-on }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore
      - name: Validate
        run: dotnet test tests/Overfloat.Tests/Overfloat.Tests.csproj -c ${{ inputs.configuration }}
      - name: Publish
        run: dotnet publish Overfloat.csproj -c ${{ inputs.configuration }} -r ${{ matrix.runtime }} --self-contained true /p:DebugType=None /p:DebugSymbols=false
      - name: Prepare Python package native library
        shell: pwsh
        run: |
          $publishDir = "bin/${{ inputs.configuration }}/net8.0/${{ matrix.runtime }}/publish"
          $packageDir = "python/overfloat"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Get-ChildItem -Path $packageDir -File |
            Where-Object { $_.Extension -in @('.dll', '.so', '.dylib') } |
            Remove-Item -Force
          $nativeLibrary = Get-ChildItem -Path $publishDir -File |
            Where-Object { $_.Name -match '^(lib)?overfloat\.(dll|so|dylib)$' } |
            Select-Object -First 1
          if ($null -eq $nativeLibrary) {
            throw "No published native library was found in $publishDir."
          }
          Copy-Item -LiteralPath $nativeLibrary.FullName -Destination "$packageDir/${{ matrix.package-library }}" -Force
      - name: Build wheel
        shell: pwsh
        run: |
          python -m pip install --upgrade pip build wheel setuptools
          if (Test-Path -LiteralPath "python/dist") {
            Remove-Item -LiteralPath "python/dist" -Recurse -Force
          }
          python -m build --wheel --outdir python/dist python
      - name: Stage release files
        shell: pwsh
        run: |
          $publishDir = "bin/${{ inputs.configuration }}/net8.0/${{ matrix.runtime }}/publish"
          $stageDir = "artifacts/${{ matrix.artifact-name }}"
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          Get-ChildItem -Path $publishDir -File |
            Where-Object { $_.Extension -in @('.dll', '.so', '.dylib', '.json', '.runtimeconfig.json') -or $_.Name -match '^(lib)?overfloat\.(dll|so|dylib)$' } |
            Copy-Item -Destination $stageDir -Force
          $wheelFiles = Get-ChildItem -Path "python/dist" -Filter *.whl -File
          if ($wheelFiles.Count -eq 0) {
            throw "No wheel files were generated in python/dist."
          }
          $wheelFiles | Copy-Item -Destination $stageDir -Force
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: artifacts/${{ matrix.artifact-name }}/*
          if-no-files-found: error

  release:
    needs: build-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          draft: false
          prerelease: false
          files: release-artifacts/**/*
